<!DOCTYPE html>
<html lang="{{ config.language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6b00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kanazawa">
  <meta name="description" content="{{ config.description }}">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{ config.title }}">
  <meta property="og:description" content="{{ config.description }}">
  <meta property="og:image" content="{{ config.base_url }}/cover.jpg">
  <meta property="og:type" content="website">
  
  <title>{{ config.title }}</title>
  <style>
    :root { 
      --bg: #0f0f0f; 
      --text: #f0f0f0; 
      --accent: #ff6b00; 
      --card: #1a1a1a;
      --card-hover: #222222;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    
    /* Header con cover */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2rem 0;
    }
    .hero img {
      width: 280px;
      height: 280px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(255, 107, 0, 0.15);
      margin-bottom: 1.5rem;
      object-fit: cover;
    }
    .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; }
    .hero p { color: #aaa; font-size: 1.1rem; max-width: 500px; margin: 0 auto; }
    
    /* Episodios */
    .episode { 
      background: var(--card); 
      border-radius: 16px; 
      padding: 1.5rem; 
      margin-bottom: 1.5rem;
      transition: transform 0.2s, background 0.2s;
    }
    .episode:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
    }
    .episode h2 { 
      font-size: 1.25rem; 
      margin-bottom: 0.5rem; 
      color: var(--accent); 
      font-weight: 600;
    }
    .meta { 
      font-size: 0.875rem; 
      color: #888; 
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .meta::before {
      content: '🎧';
    }
    audio { 
      width: 100%; 
      margin-top: 1rem;
      border-radius: 8px;
      height: 40px;
    }
    audio::-webkit-media-controls-panel {
      background: #2a2a2a;
    }
    
    /* RSS Link */
    .subscribe {
      background: linear-gradient(135deg, var(--accent), #ff8c00);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      margin: 3rem 0;
    }
    .subscribe h3 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    .subscribe code {
      background: rgba(0,0,0,0.3);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      word-break: break-all;
      display: inline-block;
      color: #fff;
    }
    
    /* Install button */
    #install-btn {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin: 2rem auto;
      width: 100%;
      max-width: 400px;
    }
    #install-btn.visible { display: block; }
    
    /* Footer */
    footer { 
      text-align: center; 
      margin-top: 3rem; 
      color: #555; 
      font-size: 0.875rem;
      padding-bottom: 2rem;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .hero img { width: 200px; height: 200px; }
      .hero h1 { font-size: 1.5rem; }
      .episode { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <img src="cover.jpg" alt="{{ config.title }}">
      <h1>{{ config.title }}</h1>
      <p>{{ config.description }}</p>
    </header>
    
    <main>
      {% for episode in episodes %}
      <article class="episode">
        <h2>{{ episode.title }}</h2>
        <div class="meta">{{ episode.date }} · {{ episode.duration }}</div>
        <p>{{ episode.description }}</p>
        <audio controls preload="metadata">
          <source src="{{ episode.audio_url }}" type="audio/mp4">
        </audio>
      </article>
      {% endfor %}
    </main>
    
    <div class="subscribe">
      <h3>Suscribite en tu app de podcasts</h3>
      <code>{{ config.base_url }}/feed.xml</code>
    </div>
    
    <button id="install-btn">📲 Instalar App</button>
    
    <footer>
      <p>{{ config.author }} · Podcast Kanazawa</p>
    </footer>
  </div>
  
  <script>
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW error:', err));
    }
    
    // Botón de instalación
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add('visible');
    });
    
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.classList.remove('visible');
      }
      deferredPrompt = null;
    });
  </script>
</body>
</html>
