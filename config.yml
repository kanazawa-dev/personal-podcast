title: "Podcast Kanazawa"
description: "Un podcast sobre ingeniería de software, crianza y política."
bio: |
  ¡Hola! Soy Alex Elgueta, papá a tiempo completo (o eso intento), esposo enamorado de Constanza Rebolledo, y entre pañales y reuniones de Zoom, soy ingeniero de software. Junto a mi mujer fundamos trysurco.cl, y también ando metido en portaldeespecialistas.com porque claramente no tenía suficiente en la cabeza.
  
  Estamos criando a nuestras hijas Josefa y Helena, lo que básicamente significa que mi casa es un campo de batalla adorable donde el café nunca está lo suficientemente caliente y el sueño es un lujo del pasado. Pero oye, las amo con todo mi ser y intentamos hacerlo lo mejor posible... aunque a veces termino leyendo sobre Maquiavelo a las 3 AM mientras una de ellas me pide agua.
  
  También estoy intentando retomar el gym cuando puedo, lo que traducido significa: fui dos veces la semana pasada, me dolió todo, y ahora necesito una semana de descanso. Pero la intención cuenta, ¿no?
  
  Este podcast nace de todo eso: de ser padre, esposo, profesional, y de querer compartir lo que aprendo sobre ingeniería de software, crianza y política. Es para los que se sientan identificados, para los que quieren aprender algo, o simplemente para los que necesitan compañía mientras lavan los platos. Lo hago con todo el amor del mundo, entre una cosa y otra, y se actualiza... bueno, cuando la vida me deja jajaja.
