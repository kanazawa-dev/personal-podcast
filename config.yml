title: "Podcast Kanazawa"
description: "Un podcast sobre ingeniería de software, crianza y política."
bio: |
  👋 ¡Hola! Soy Alex Elgueta. De día soy ingeniero de software, y de tiempo completo soy papá de Josefa y Helena ❤️, y esposo de Constanza Rebolledo ❤️, la mujer que hace que todo esto funcione.

  Junto a ella fundamos <a href="https://trysurco.com" target="_blank">trysurco.com</a>, donde ella aprende tecnología de mí y yo aprendo todo lo demás de ella. También participo en <a href="https://portaldeespecialistas.com" target="_blank">portaldeespecialistas.com</a>.

  El nombre <strong>Kanazawa</strong> viene de mi fascinación por los samuráis: la disciplina, la estrategia, la calma bajo presión... y admitámoslo, las espadas son geniales. Esa filosofía de mejora constante es lo que intento traer aquí.

  Este podcast es sobre <strong>ingeniería de software, crianza y política</strong>. Sobre leer a Maquiavelo a las 3 AM mientras una de mis hijas me pide agua. Sobre intentar volver al gimnasio (fui dos veces, me dolió todo, y ahora necesito una semana de descanso). Sobre criar en un campo de batalla adorable donde el café nunca está lo suficientemente caliente.

  Es para quienes se sientan identificados, para quienes quieran aprender, o simplemente para quienes necesiten compañía mientras lavan los platos. Lo hago con todo el amor del mundo, entre pañales y deploys, y se actualiza cuando la vida me lo permite.

  <strong>Si quieres que haga un podcast sobre algo</strong>, escríbeme y pídemelo. Quizás lo puedo agregar.
