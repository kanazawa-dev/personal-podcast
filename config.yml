title: "Podcast Kanazawa"
description: "Un podcast sobre ingeniería de software, crianza y política."
bio: |
  ¡Hola! Soy Alex Elgueta. De día (y a veces de noche) soy ingeniero de software. De tiempo completo, soy papá de Josefa y Helena, y esposo de Constanza Rebolledo, la mujer que hace que todo esto funcione.

  <strong>Junto a ella fundamos:</strong><br>
  — <a href="https://trysurco.cl" target="_blank">trysurco.cl</a>, donde ella aprende de tecnología de mí y yo aprendo todo el resto de ella. Jajaja.

  <strong>También ando en:</strong><br>
  — <a href="https://portaldeespecialistas.com" target="_blank">portaldeespecialistas.com</a>.

  <strong>¿Por qué Kanazawa?</strong><br>
  Porque me fascinan los samuráis. La disciplina, la estrategia, la calma bajo presión... y admitámoslo, las espadas son muy cool. Esa filosofía de mejora constante es lo que intento traer acá.

  <strong>¿De qué va esto?</strong><br>
  De ingeniería de software, crianza y política. De leer a Maquiavelo a las 3 AM mientras una de mis hijas me pide agua. De intentar retomar el gym (fui dos veces, me dolió todo, descanso una semana). De criar en un campo de batalla adorable donde el café nunca está lo suficientemente caliente.

  Es para quienes se sientan identificados, para quienes quieran aprender, o simplemente para quienes necesiten compañía mientras lavan los platos. Lo hago con todo el amor del mundo, entre pañales y deploys, y se actualiza... bueno, cuando la vida me deja. Jajaja.

  <strong>¿Querés un podcast sobre algo?</strong><br>
  Si tenés mi número, escribime y pedímelo. Quizás lo puedo agregar.
