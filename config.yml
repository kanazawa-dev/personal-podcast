title: "Podcast Kanazawa"
description: "Un podcast sobre ingeniería de software, crianza y política."
bio: |
  Mi nombre es Alex Elgueta, ingeniero de software y co-fundador de trysurco.cl junto a mi pareja Constanza Rebolledo. También soy co-fundador de portaldeespecialistas.com.
  
  Estamos criando a nuestras hijas Josefa y Helena de la mejor manera posible, mientras intentamos estar siempre informados y seguir aprendiendo.
  
  Este podcast es para quienes se sientan alineados con nosotros y quieran aprender (o simplemente escuchar) sobre ingeniería de software, crianza y política. Lo hago con todo el amor del mundo y se actualiza a medida que pueda... jajaja.
